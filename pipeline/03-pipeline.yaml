apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: hello-pipeline
  namespace: hello-pipeline
spec:
  description: Clone the application, build an immutable image in OpenShift, and deploy it directly to the cluster.
  params:
    - name: git-repo-application
      type: string
      description: Git repository URL for the application source.
      default: "https://github.com/marcelobruckner/hello-app"
    - name: context
      type: string
      description: Build context used by the OpenShift binary build.
      default: "."
  workspaces:
    - name: shared-data
      description: Workspace containing the cloned application source.
  tasks:
    - name: fetch-source
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-data
      params:
        - name: url
          value: "$(params.git-repo-application)"
        - name: deleteExisting
          value: "true"
        - name: submodules
          value: "false"

    - name: get-git-sha
      runAfter:
        - fetch-source
      taskRef:
        name: get-git-sha
      workspaces:
        - name: source
          workspace: shared-data

    - name: build-image
      runAfter:
        - get-git-sha
      taskRef:
        name: build-openshift-image
      workspaces:
        - name: source
          workspace: shared-data
      params:
        - name: NAMESPACE
          value: "hello-pipeline"
        - name: BUILD_CONFIG
          value: "hello-build"
        - name: IMAGE_STREAM
          value: "hello"
        - name: IMAGE_TAG
          value: "$(tasks.get-git-sha.results.commit-sha)"
        - name: CONTEXT
          value: "$(params.context)"

    - name: deploy-to-dev
      runAfter:
        - build-image
      taskRef:
        name: deploy-openshift
      params:
        - name: NAMESPACE
          value: "hello-pipeline"
        - name: APP_NAME
          value: "hello"
        - name: IMAGE_REF
          value: "$(tasks.build-image.results.IMAGE_DIGEST)"
        - name: CONTAINER_PORT
          value: "8080"
