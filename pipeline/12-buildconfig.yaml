apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: hello-build
  namespace: hello-pipeline
spec:
  runPolicy: Serial
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: hello:latest
  successfulBuildsHistoryLimit: 1
  failedBuildsHistoryLimit: 1
