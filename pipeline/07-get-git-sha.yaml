apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: get-git-sha
  namespace: hello-pipeline
spec:
  workspaces:
    - name: source
      description: Workspace containing the cloned repository.
  results:
    - name: commit-sha
      description: Short SHA of the latest commit.
  steps:
    - name: extract-sha
      image: alpine/git
      securityContext:
        runAsUser: 65532
      env:
        - name: HOME
          value: /tekton/home
      script: |
        #!/bin/sh
        set -eu
        mkdir -p "$HOME"
        cd "$(workspaces.source.path)"
        git config --global --add safe.directory "$(workspaces.source.path)"
        sha=$(git rev-parse --short HEAD)
        printf 'Commit SHA: %s\n' "$sha"
        printf '%s' "$sha" > "$(results.commit-sha.path)"
